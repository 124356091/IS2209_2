services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deployhub
      POSTGRES_PASSWORD: deployhub
      POSTGRES_DB: deployhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployhub"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://deployhub:deployhub@db:5432/deployhub
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret}
      FLASK_APP: app.py
      LOG_LEVEL: DEBUG
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
